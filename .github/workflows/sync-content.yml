name: Sync generated content

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'data/**'
      - 'scripts/build-content.mjs'
      - 'scripts/generate-readme.mjs'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generated-content-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run content
      - run: npm run readme
      - name: Commit generated files when needed
        run: |
          if git diff --quiet -- README.md src/generated/content.json; then
            echo "Generated files are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md src/generated/content.json
          git commit -m "chore: sync generated content"
          git pull --rebase origin main
          git push origin HEAD:main
